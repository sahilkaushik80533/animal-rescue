<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stray Animal Rescue Dispatch</title>
  <meta name="description" content="Stray Animal Rescue Dispatch System — DSA Project by Sahil Kaushik">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #f1f3f6;
      --card-bg: #ffffff;
      --card-border: #e2e6ec;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
      --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.10);

      --text-primary: #1a1d23;
      --text-secondary: #5f6b7a;
      --text-muted: #99a3b0;
      --border-input: #cdd3dc;

      --navy: #1e3a5f;
      --navy-hover: #152d4a;
      --teal: #0d7377;
      --teal-hover: #095456;

      --green: #0f8c5e;
      --green-bg: #e6f7ef;
      --amber: #b8860b;
      --amber-bg: #fdf5e1;
      --orange: #c05621;
      --orange-bg: #fef0e5;
      --red: #c0392b;
      --red-bg: #fde8e6;
    }

    * { font-family: 'Inter', sans-serif; }

    body {
      background: var(--page-bg);
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* ---- Navbar ---- */
    .navbar {
      background: var(--navy) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .navbar-brand {
      font-weight: 800;
      font-size: 1.2rem;
      color: #ffffff !important;
      letter-spacing: -0.3px;
    }
    .navbar-brand i { color: #5bc0be; }
    .navbar .text-secondary { color: rgba(255,255,255,0.55) !important; font-size: 0.8rem; }

    /* ---- Cards ---- */
    .dash-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      transition: box-shadow 0.2s ease;
    }
    .dash-card:hover { box-shadow: var(--card-shadow-hover); }

    /* ---- Stat Cards ---- */
    .stat-number {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.1;
    }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .stat-pending  { border-left: 4px solid var(--amber); }
    .stat-pending  .stat-number { color: var(--amber); }
    .stat-dispatched { border-left: 4px solid var(--green); }
    .stat-dispatched .stat-number { color: var(--green); }
    .stat-total    { border-left: 4px solid var(--navy); }
    .stat-total    .stat-number { color: var(--navy); }

    /* ---- Tabs ---- */
    .nav-pills { gap: 6px; }
    .nav-pills .nav-link {
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 9px 18px;
      font-weight: 600;
      font-size: 0.85rem;
      border: 1px solid transparent;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .nav-pills .nav-link:not(.active):hover {
      color: var(--navy);
      background: #e8ecf1;
      border-color: #dce0e8;
    }
    .nav-pills .nav-link.active {
      background: var(--navy);
      color: #ffffff;
      border-color: var(--navy);
      box-shadow: 0 2px 8px rgba(30,58,95,0.25);
    }

    .tab-content { margin-top: 1.25rem; }

    /* ---- Section Headers ---- */
    .dash-card h5 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .dash-card h5 small {
      font-weight: 500;
      color: var(--text-muted) !important;
      font-size: 0.78rem;
    }

    /* ---- Forms ---- */
    .form-label {
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .form-control, .form-select {
      background: #ffffff;
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(30,58,95,0.12);
      background: #ffffff;
      color: var(--text-primary);
    }
    .form-control::placeholder { color: var(--text-muted); }

    /* ---- Buttons — Primary Action ---- */
    .btn-accent {
      background: var(--navy);
      border: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.88rem;
      border-radius: 8px;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .btn-accent:hover {
      background: var(--navy-hover);
      box-shadow: 0 3px 12px rgba(30,58,95,0.30);
      transform: translateY(-1px);
      color: #ffffff;
    }
    .btn-accent:active { transform: translateY(0); }
    .btn-accent:disabled {
      background: #b0b8c4;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ---- Buttons — Dispatch (Destructive Action) ---- */
    .btn-dispatch {
      background: var(--red);
      border: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.88rem;
      border-radius: 8px;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .btn-dispatch:hover {
      background: #a8311f;
      box-shadow: 0 3px 12px rgba(192,57,43,0.30);
      transform: translateY(-1px);
      color: #ffffff;
    }
    .btn-dispatch:active { transform: translateY(0); }
    .btn-dispatch:disabled {
      background: #b0b8c4;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ---- Tables ---- */
    .table {
      --bs-table-bg: transparent;
      --bs-table-color: var(--text-primary);
      margin-bottom: 0;
    }
    .table thead th {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      border-bottom: 2px solid var(--card-border);
      padding: 10px 12px;
      background: #fafbfc;
    }
    .table td {
      vertical-align: middle;
      border-bottom: 1px solid #f0f2f5;
      padding: 11px 12px;
      font-size: 0.88rem;
    }
    .table tbody tr:hover { background: #f7f9fb; }
    .table td.text-secondary { color: var(--text-secondary) !important; }

    /* ---- Urgency Badges ---- */
    .badge-urgency {
      padding: 3px 10px;
      border-radius: 5px;
      font-weight: 700;
      font-size: 0.78rem;
      display: inline-block;
      min-width: 30px;
      text-align: center;
    }

    /* ---- Status Badges ---- */
    .status-badge-pending    { background: var(--amber-bg); color: var(--amber); }
    .status-badge-dispatched { background: var(--green-bg); color: var(--green); }

    /* ---- Urgency Slider ---- */
    .urgency-slider { width: 100%; accent-color: var(--navy); }
    .urgency-label  { font-weight: 800; font-size: 1.05rem; }

    /* ---- Search Toggle ---- */
    .search-toggle .btn {
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .search-toggle .btn-outline-secondary {
      color: var(--text-secondary);
      border-color: var(--border-input);
    }
    .search-toggle .btn-outline-secondary:hover {
      background: #e8ecf1;
      color: var(--text-primary);
      border-color: #bcc3ce;
    }
    .search-toggle .btn-check:checked + .btn-outline-secondary {
      background: var(--navy);
      border-color: var(--navy);
      color: #ffffff;
    }

    /* ---- Toast ---- */
    .toast-container { z-index: 9999; }

    /* ---- Empty State ---- */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      display: block;
      color: #c9ced6;
    }
    .empty-state p { margin: 0; font-size: 0.9rem; }

    /* ---- Fade In Animation ---- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.35s ease-out; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-heart-pulse-fill me-2"></i>Rescue Dispatch</span>
    <span class="text-secondary small">DSA Engine: C &middot; Backend: Flask &middot; DB: SQLite</span>
  </div>
</nav>

<div class="container py-4">

  <!-- Stats -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-md-4">
      <div class="dash-card p-4 stat-pending">
        <div class="stat-label">Pending Calls</div>
        <div class="stat-number" id="stat-pending">0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="dash-card p-4 stat-dispatched">
        <div class="stat-label">Dispatched</div>
        <div class="stat-number" id="stat-dispatched">0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="dash-card p-4 stat-total">
        <div class="stat-label">Total Logged</div>
        <div class="stat-number" id="stat-total">0</div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-pills mb-2" id="mainTabs">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-log"><i class="bi bi-plus-circle me-1"></i>Log Call</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-pending"><i class="bi bi-list-ul me-1"></i>Pending</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-search"><i class="bi bi-search me-1"></i>Search</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-history"><i class="bi bi-clock-history me-1"></i>History</button></li>
  </ul>

  <div class="tab-content">

    <!-- LOG CALL -->
    <div class="tab-pane fade show active" id="tab-log">
      <div class="dash-card p-4 fade-in">
        <h5 class="mb-3">Log a New Rescue Call</h5>
        <form id="log-form">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" id="inp-location" placeholder="e.g. Sector 22, Park Road" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Animal Type</label>
              <select class="form-select" id="inp-animal">
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Cow">Cow</option>
                <option value="Bird">Bird</option>
                <option value="Monkey">Monkey</option>
                <option value="Snake">Snake</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="inp-desc" rows="2" placeholder="Brief situation description" required></textarea>
            </div>
            <div class="col-md-8">
              <label class="form-label">Urgency: <span id="urgency-display" class="urgency-label" style="color:var(--green)">1 — Low</span></label>
              <input type="range" class="form-range urgency-slider" id="inp-urgency" min="1" max="10" value="1">
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button type="submit" class="btn btn-accent w-100"><i class="bi bi-send-fill me-2"></i>Submit Call</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- PENDING -->
    <div class="tab-pane fade" id="tab-pending">
      <div class="dash-card p-4 fade-in">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">Pending Rescue Queue</h5>
          <button class="btn btn-dispatch" id="btn-dispatch"><i class="bi bi-lightning-fill me-1"></i>Dispatch Highest Priority</button>
        </div>
        <div id="pending-content"></div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="tab-pane fade" id="tab-search">
      <div class="dash-card p-4 fade-in">
        <h5 class="mb-3">Search Calls <small>(via C BST Engine)</small></h5>
        <div class="row g-3 mb-3">
          <div class="col-md-3">
            <div class="search-toggle btn-group w-100">
              <input type="radio" class="btn-check" name="stype" id="stype-animal" value="animal" checked>
              <label class="btn btn-outline-secondary" for="stype-animal"><i class="bi bi-bug me-1"></i>Animal</label>
              <input type="radio" class="btn-check" name="stype" id="stype-location" value="location">
              <label class="btn btn-outline-secondary" for="stype-location"><i class="bi bi-geo-alt me-1"></i>Location</label>
            </div>
          </div>
          <div class="col-md-7">
            <input type="text" class="form-control" id="inp-search" placeholder="Enter search query...">
          </div>
          <div class="col-md-2">
            <button class="btn btn-accent w-100" id="btn-search"><i class="bi bi-search"></i> Search</button>
          </div>
        </div>
        <div id="search-results"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-pane fade" id="tab-history">
      <div class="dash-card p-4 fade-in">
        <h5 class="mb-3">Dispatch History <small>(Stack — LIFO order from DB)</small></h5>
        <div id="history-content"></div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="app-toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '';

function toast(msg, type = 'success') {
  const el = document.getElementById('app-toast');
  el.className = `toast align-items-center border-0 text-bg-${type}`;
  document.getElementById('toast-msg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el).show();
}

function urgencyColor(u) {
  if (u <= 3) return 'var(--green)';
  if (u <= 6) return 'var(--amber)';
  if (u <= 8) return 'var(--orange)';
  return 'var(--red)';
}

function urgencyBadge(u) {
  const bg = u <= 3 ? 'var(--green-bg)' : u <= 6 ? 'var(--amber-bg)' : u <= 8 ? 'var(--orange-bg)' : 'var(--red-bg)';
  return `<span class="badge-urgency" style="background:${bg};color:${urgencyColor(u)}">${u}</span>`;
}

function statusBadge(s) {
  return `<span class="badge-urgency status-badge-${s}">${s}</span>`;
}

function emptyState(icon, text) {
  return `<div class="empty-state"><i class="bi bi-${icon}"></i><p>${text}</p></div>`;
}

function buildTable(rows, showStatus = false, showDispatched = false) {
  if (!rows.length) return emptyState('inbox', 'No records found.');
  let html = `<div class="table-responsive"><table class="table table-hover"><thead><tr>
    <th>ID</th><th>Location</th><th>Animal</th><th>Description</th><th>Urgency</th>`;
  if (showStatus) html += '<th>Status</th>';
  if (showDispatched) html += '<th>Dispatched At</th>';
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr><td>#${r.id}</td><td>${r.location}</td><td>${r.animal_type}</td>
      <td class="text-secondary">${r.description}</td><td>${urgencyBadge(r.urgency)}</td>`;
    if (showStatus) html += `<td>${statusBadge(r.status)}</td>`;
    if (showDispatched) html += `<td class="text-secondary small">${r.dispatched_at || '—'}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

async function loadStats() {
  const res = await fetch(`${API}/api/stats`);
  const d = await res.json();
  document.getElementById('stat-pending').textContent = d.pending;
  document.getElementById('stat-dispatched').textContent = d.dispatched;
  document.getElementById('stat-total').textContent = d.total;
}

async function loadPending() {
  const res = await fetch(`${API}/api/sorted`);
  const rows = await res.json();
  const el = document.getElementById('pending-content');
  if (!rows.length) {
    el.innerHTML = emptyState('check-circle', 'No pending calls — all clear!');
    return;
  }
  el.innerHTML = buildTable(rows);
}

async function loadHistory() {
  const res = await fetch(`${API}/api/rescues?status=dispatched`);
  const rows = await res.json();
  document.getElementById('history-content').innerHTML =
    rows.length ? buildTable(rows, false, true) : emptyState('clock-history', 'No dispatches yet.');
}

/* Urgency slider live feedback */
document.getElementById('inp-urgency').addEventListener('input', function() {
  const v = parseInt(this.value);
  const labels = { 1:'Low', 2:'Low', 3:'Low', 4:'Moderate', 5:'Moderate', 6:'Moderate', 7:'High', 8:'High', 9:'Critical', 10:'Critical' };
  const display = document.getElementById('urgency-display');
  display.textContent = `${v} — ${labels[v]}`;
  display.style.color = urgencyColor(v);
});

/* Log form submit */
document.getElementById('log-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const body = {
    location:    document.getElementById('inp-location').value.trim(),
    animal_type: document.getElementById('inp-animal').value,
    description: document.getElementById('inp-desc').value.trim(),
    urgency:     parseInt(document.getElementById('inp-urgency').value)
  };
  const res = await fetch(`${API}/api/rescues`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (res.ok) {
    toast(`Call logged! Urgency: ${body.urgency}/10`);
    this.reset();
    document.getElementById('urgency-display').textContent = '1 — Low';
    document.getElementById('urgency-display').style.color = 'var(--green)';
    loadStats(); loadPending();
  } else {
    const err = await res.json();
    toast(err.error || 'Failed to log call.', 'danger');
  }
});

/* Dispatch button */
document.getElementById('btn-dispatch').addEventListener('click', async function() {
  this.disabled = true;
  const res = await fetch(`${API}/api/dispatch`, { method: 'POST' });
  const data = await res.json();
  this.disabled = false;
  if (res.ok) {
    toast(`Dispatched Call #${data.id} (${data.animal_type}, urgency ${data.urgency})`);
    loadStats(); loadPending(); loadHistory();
  } else {
    toast(data.error || 'Dispatch failed.', 'danger');
  }
});

/* Search */
document.getElementById('btn-search').addEventListener('click', async function() {
  const stype = document.querySelector('input[name="stype"]:checked').value;
  const q = document.getElementById('inp-search').value.trim();
  if (!q) { toast('Enter a search query.', 'warning'); return; }

  const res = await fetch(`${API}/api/search?type=${stype}&q=${encodeURIComponent(q)}`);
  const rows = await res.json();
  const el = document.getElementById('search-results');
  if (Array.isArray(rows) && rows.length) {
    el.innerHTML = `<p class="text-secondary mb-2">${rows.length} result(s) for "${q}"</p>` + buildTable(rows, true);
  } else {
    el.innerHTML = emptyState('search', `No results for "${q}".`);
  }
});

document.getElementById('inp-search').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('btn-search').click();
});

/* Tab change hooks */
document.querySelectorAll('#mainTabs button').forEach(btn => {
  btn.addEventListener('shown.bs.tab', () => {
    const target = btn.getAttribute('data-bs-target');
    if (target === '#tab-pending') loadPending();
    if (target === '#tab-history') loadHistory();
  });
});

/* Initial load */
loadStats();
</script>
</body>
</html>
